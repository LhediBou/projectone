<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether Marketing - Human Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020205;
            --accent-color: #ffffff;
            --primary-blue: #4a90e2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Subtle vignette on the left for contrast */
        #canvas-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 60%; height: 100%;
            background: linear-gradient(to right, rgba(2, 2, 5, 0.8), transparent);
            pointer-events: none;
            z-index: 2;
        }

        .content {
            position: relative;
            z-index: 10;
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            pointer-events: none;
        }

        .text-side {
            max-width: 60%;
            opacity: 0;
            z-index: 20; /* Ensure text is above human if they overlap */
            transform: translateX(-50px);
            animation: slideInLeft 1.5s 0.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .human-side {
            position: relative;
            height: 100vh;
            width: 45%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            transform: translateX(50px) scale(1.02);
            animation: slideInRight 1.8s 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        .human-image {
            height: 100%;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 50px rgba(74, 144, 226, 0.2));
            mix-blend-mode: screen; /* Perfect for solid black backgrounds */
            mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 80%, transparent 100%);
            animation: floatHuman 8s ease-in-out infinite alternate;
        }

        .logo {
            font-size: 5rem;
            font-weight: 700;
            letter-spacing: 0.5rem;
            background: linear-gradient(to right, #ffffff, #4a90e2); /* More blue, less white */
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            filter: drop-shadow(0 0 40px rgba(74, 144, 226, 0.2));
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .tagline {
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: 0.4rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .marketing-copy {
            font-size: 1.1rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2.5rem;
            border-left: 2px solid var(--primary-blue);
            padding-left: 1.5rem;
        }

        .glow-button {
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            pointer-events: auto; /* Active for clicks */
            cursor: pointer;
            z-index: 100;
        }

        .glow-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Success Overlay */
        #access-overlay {
            position: fixed;
            top: 0; left: 0; 
            width: 100%; height: 100%;
            background: #020205; /* Black instead of white for the success screen */
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s;
        }

        .access-granted {
            color: #fff; /* White text on black background */
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: 0.8rem;
            transform: scale(0.9);
            transition: 3s cubic-bezier(0.19, 1, 0.22, 1);
            text-shadow: 0 0 30px rgba(74, 144, 226, 1);
            text-align: center;
        }

        .access-granted span {
            display: block;
            font-size: 1rem;
            letter-spacing: 1.5rem;
            opacity: 0.5;
            margin-top: 1rem;
            font-weight: 200;
        }

        #error-msg {
            color: #ff4d4d;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.1rem;
            margin-top: 0.5rem;
            opacity: 0;
            transition: 0.3s;
        }

        /* Warp State */
        .warping .text-side, .warping .human-side {
            opacity: 0 !important;
            transform: scale(0.9) !important;
            transition: 1s cubic-bezier(0.19, 1, 0.22, 1);
            filter: blur(20px);
        }

        @keyframes floatHuman {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        @keyframes slideInLeft {
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            to { opacity: 1; transform: translateX(0) scale(1.02); }
        }
    </style>
</head>
<body class="initial">
    <div id="canvas-container"></div>
    <div id="access-overlay">
        <div class="access-granted">
            ACCESS GRANTED
            <span>INITIALIZING PLATFORM...</span>
        </div>
    </div>
    <div class="content" id="main-content">
        <div class="text-side">
            <h1 class="logo">AETHER</h1>
            <p class="tagline">Scale the Infinite</p>
            <p class="marketing-copy">
                Experience the next generation of data visualization.<br>
                Seamless. Powerful. Ethereal.
            </p>
            <div class="glow-button" id="access-btn">ENTER PASSWORD</div>
            
            <div id="password-wrapper" style="display: none; margin-top: 1rem; opacity: 0; transition: 0.5s; text-align: center;">
                <input type="password" id="pass-input" placeholder="CODE" maxlength="4" 
                    style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
                           color: white; padding: 0.8rem; font-family: inherit; font-size: 1.2rem; 
                           text-align: center; width: 120px; letter-spacing: 0.5rem; outline: none;">
                <div id="error-msg">TRY AGAIN</div>
            </div>
        </div>
        <div class="human-side">
            <img src="spokesperson_clean.png" alt="Spokesperson" class="human-image">
        </div>
    </div>

    <!-- Shake Animation for wrong pass -->
    <style>
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        // Use the same Three.js background
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x020205, 1);
        container.appendChild(renderer.domElement);

        scene.fog = new THREE.FogExp2(0x020205, 0.15);

        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));
        
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            1.0, 0.4, 0.9 // Reduced strength from 1.5 to 1.0, increased threshold
        );
        composer.addPass(bloomPass);

        // Particles
        const particleCount = 25000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount);
        
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 10 + 2;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);

            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = (Math.random() - 0.5) * 15;

            velocities[i] = Math.random() * 0.02 + 0.01;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const vertexShader = `
            uniform float time;
            uniform float warp;
            varying vec3 vColor;
            void main() {
                vec3 pos = position;
                // Movement towards camera
                pos.z += time * 5.0;
                pos.z = mod(pos.z + 10.0, 20.0) - 10.0;
                
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                
                // Stretch effect during warp
                float size = 2.0;
                if (warp > 0.1) {
                    size += warp * 20.0;
                }
                
                gl_PointSize = size * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
                vColor = vec3(0.4, 0.6, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            void main() {
                float dist = distance(gl_PointCoord, vec2(0.5));
                if (dist > 0.5) discard;
                gl_FragColor = vec4(vColor, 1.0 - dist * 2.0);
            }
        `;

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                warp: { value: 0 }
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthTest: false
        });

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        scene.add(particleSystem);

        let startTime = Date.now();
        let isWarping = false;
        let warpStartTime = 0;

        function animate() {
            const now = Date.now();
            const elapsed = now - startTime;
            shaderMaterial.uniforms.time.value = elapsed * 0.001;

            if (isWarping) {
                const warpElapsed = now - warpStartTime;
                const warpProgress = Math.min(warpElapsed / 2000, 1);
                shaderMaterial.uniforms.warp.value = warpProgress * 5.0;
                
                camera.position.z -= warpProgress * 0.1;

                if (warpProgress >= 0.9) {
                    document.getElementById('access-overlay').style.opacity = '1';
                    document.querySelector('.access-granted').style.transform = 'scale(1)';
                    
                    // Redirect to Local Cinematic Brief after 2 seconds
                    if (!this.redirected) {
                        this.redirected = true;
                        setTimeout(() => {
                            window.location.href = "brief_cinematic.html";
                        }, 2000);
                    }
                }
            } else {
                particleSystem.rotation.y += 0.0003;
            }

            composer.render();
            requestAnimationFrame(animate);
        }

        animate();

        // Interaction
        const accessBtn = document.getElementById('access-btn');
        const passWrapper = document.getElementById('password-wrapper');
        const passInput = document.getElementById('pass-input');

        accessBtn.addEventListener('click', () => {
            accessBtn.style.display = 'none';
            passWrapper.style.display = 'block';
            setTimeout(() => {
                passWrapper.style.opacity = '1';
                passInput.focus();
            }, 10);
        });

        passInput.addEventListener('input', (e) => {
            const val = e.target.value;
            if (val.length === 4) {
                if (val === '9999') {
                    // Success!
                    isWarping = true;
                    warpStartTime = Date.now();
                    document.body.classList.add('warping');
                    passWrapper.style.opacity = '0';
                    setTimeout(() => passWrapper.style.display = 'none', 500);
                } else {
                    // Fail!
                    passInput.classList.add('shake');
                    document.getElementById('error-msg').style.opacity = '1';
                    setTimeout(() => {
                        passInput.classList.remove('shake');
                        passInput.value = '';
                    }, 500);
                }
            } else {
                document.getElementById('error-msg').style.opacity = '0';
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        window.recordVideo = async () => {
            const stream = renderer.domElement.captureStream(60);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];
            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = 'aether_interactive_shock.webm'; a.click();
            };
            recorder.start();
            setTimeout(() => recorder.stop(), 5000);
        };
    </script>
</body>
</html>
