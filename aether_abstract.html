<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER - Cinematic Intro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #020205;
            --accent-color: #ffffff;
            --glow-color: rgba(100, 150, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .logo {
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 200;
            letter-spacing: 2.5rem;
            opacity: 0;
            margin-right: -2.5rem;
            
            background: linear-gradient(120deg, 
                rgba(255,255,255,1) 0%, 
                rgba(255,255,255,1) 40%, 
                rgb(148, 182, 255) 50%, 
                rgba(255,255,255,1) 60%, 
                rgba(255,255,255,1) 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            
            animation: fadeInLogo 5s cubic-bezier(0.19, 1, 0.22, 1) forwards,
                       shine 8s linear infinite;
            
            filter: drop-shadow(0 0 30px rgba(100, 150, 255, 0.2));
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            opacity: 0;
            margin-top: 0.5rem;
            text-transform: uppercase;
            animation: fadeInSubtitle 3s 1.5s ease-out forwards;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        @keyframes fadeInLogo {
            0% {
                opacity: 0;
                letter-spacing: 5rem;
                transform: scale(1.05);
                filter: blur(20px);
            }
            100% {
                opacity: 1;
                letter-spacing: 2.5rem;
                transform: scale(1);
                filter: blur(0);
            }
        }

        @keyframes fadeInSubtitle {
            0% {
                opacity: 0;
                transform: translateY(20px);
                letter-spacing: 1.5rem;
            }
            100% {
                opacity: 1;
                transform: translateY(0);
                letter-spacing: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="content">
        <h1 class="logo">AETHER</h1>
        <div class="subtitle">Defining the infinite</div>
    </div>

    <!-- Three.js (Legacy Global Scripts for compatibility) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>

    <script>
        // Setup
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x020205, 1);
        container.appendChild(renderer.domElement);

        // Add Fog for depth
        scene.fog = new THREE.FogExp2(0x020205, 0.15);

        // Post-processing
        const composer = new THREE.EffectComposer(renderer);
        composer.addPass(new THREE.RenderPass(scene, camera));
        
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            2.0, // strength
            0.5, // radius
            0.6  // threshold
        );
        composer.addPass(bloomPass);

        // Shaders
        const vertexShader = `
            attribute float size;
            attribute vec3 customColor;
            varying vec3 vColor;
            uniform float time;
            void main() {
                vColor = customColor;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                // Subtle pulse based on time and position
                float pulse = 1.0 + 0.2 * sin(time * 2.0 + position.x * 2.0);
                gl_PointSize = size * pulse * (300.0 / -mvPosition.z);
                gl_Position = projectionMatrix * mvPosition;
            }
        `;

        const fragmentShader = `
            varying vec3 vColor;
            uniform float opacity;
            void main() {
                float dist = distance(gl_PointCoord, vec2(0.5));
                if (dist > 0.5) discard;
                float alpha = (1.0 - dist * 2.0) * opacity;
                gl_FragColor = vec4(vColor, alpha);
            }
        `;

        // Particles
        const particleCount = 25000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        
        for (let i = 0; i < particleCount; i++) {
            const r = Math.random() * 8 + 1;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos((Math.random() * 2) - 1);

            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = (Math.random() - 0.5) * 12;

            const mix = Math.random();
            colors[i * 3] = mix > 0.7 ? 0.5 : 1.0; 
            colors[i * 3 + 1] = mix > 0.7 ? 0.7 : 1.0;
            colors[i * 3 + 2] = 1.0;
            
            sizes[i] = Math.random() * 0.5 + 0.1;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        const shaderMaterial = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                opacity: { value: 0 }, // Start at 0 for fade in
            },
            vertexShader: vertexShader,
            fragmentShader: fragmentShader,
            blending: THREE.AdditiveBlending,
            depthTest: false,
            transparent: true,
        });

        const particleSystem = new THREE.Points(geometry, shaderMaterial);
        scene.add(particleSystem);

        // Animation logic
        let startTime = Date.now();
        const duration = 5000;

        function animate() {
            const elapsed = Date.now() - startTime;
            const progress = (elapsed % duration) / duration;

            shaderMaterial.uniforms.time.value = elapsed * 0.001;
            
            // Lifecycle: Fade in (1s), Steady (3s), Fade out (1s)
            if (elapsed < 1000) {
                shaderMaterial.uniforms.opacity.value = elapsed / 1000;
            } else if (elapsed > 4000) {
                shaderMaterial.uniforms.opacity.value = Math.max(0, 1 - (elapsed - 4000) / 1000);
            } else {
                shaderMaterial.uniforms.opacity.value = 1.0;
            }

            particleSystem.rotation.y += 0.0005;
            particleSystem.rotation.z += 0.0002;

            camera.position.z = 6 - Math.sin(progress * Math.PI) * 0.8;

            composer.render();
            requestAnimationFrame(animate);
        }

        animate();

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });

        // VIDEO CAPTURE LOGIC
        window.recordVideo = async () => {
            const stream = renderer.domElement.captureStream(60);
            const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
            const chunks = [];

            recorder.ondataavailable = e => chunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'aether_marketing.webm';
                a.click();
            };

            startTime = Date.now(); 
            recorder.start();
            setTimeout(() => recorder.stop(), 5000);
        };
    </script>
</body>
</html>
